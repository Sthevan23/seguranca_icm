<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Escala - Segurança ICM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div id="toast-container"></div>

    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <h1>Escala de Rondas</h1>
            <p>Ambulatório, Pomar, Fazendinha, Central</p>
        </header>

        <main class="main-content">
            <section class="controls glass card-reveal">
                <div class="input-group">
                    <label for="route-select"><i class="fa-solid fa-route"></i> Rota da Ronda</label>
                    <select id="route-select" class="custom-select">
                        <option value="Ambulatório">Ambulatório</option>
                        <option value="Pomar">Pomar</option>
                        <option value="Fazendinha">Fazendinha</option>
                        <option value="Central">Central</option>

                    </select>
                </div>

                <div class="input-group">
                    <label for="names"><i class="fa-solid fa-users"></i> Nomes dos Responsáveis</label>
                    <textarea id="names" placeholder="Exemplo:&#10;João&#10;Maria&#10;Pedro"></textarea>
                    <small class="hint">Adicione um nome por linha</small>
                </div>

                <div class="options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="domingoTodos" checked>
                        <span class="checkmark"></span>
                        <span class="label-text">Marcar "TODOS" no Domingo (08:00 às 12:00)</span>
                    </label>
                </div>

                <div class="button-group">
                    <button id="generateBtn" class="btn-primary">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Gerar Escala
                    </button>
                    <button id="copyBtn" class="btn-secondary">
                        <i class="fa-regular fa-copy"></i> Copiar
                    </button>
                    <button id="printBtn" class="btn-secondary">
                        <i class="fa-solid fa-print"></i> Imprimir
                    </button>
                    <button id="pdfBtn" class="btn-secondary">
                        <i class="fa-solid fa-file-pdf"></i> PDF
                    </button>
                </div>
            </section>

            <section class="result-section glass card-reveal" style="animation-delay: 0.1s;">
                <div id="tableContainer">
                    <table id="escalaTable">
                        <thead>
                            <tr>
                                <th><i class="fa-regular fa-calendar"></i> Dia</th>
                                <th><i class="fa-regular fa-clock"></i> Horário</th>
                                <th><i class="fa-solid fa-user-shield"></i> Responsável</th>
                            </tr>
                        </thead>
                        <tbody id="escalaBody">
                            <!-- Gerado via JS -->
                            <tr class="empty-state">
                                <td colspan="3">
                                    <div class="empty-content">
                                        <i class="fa-regular fa-calendar-plus"></i>
                                        <p>Adicione os nomes e clique em "Gerar Escala" para visualizar.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
